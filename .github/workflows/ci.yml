name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly run catches drift that lands between pushes: new stable-clippy
  # lints and new RustSec advisories.
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    # rustfmt does not compile anything, so it can run on the cheap runner.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Glide only builds on macOS (Objective-C runtime, Security framework,
  # apple-native keyring), so lint and tests must run on macos-latest.
  clippy:
    name: Lint
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # --workspace covers the glide-benchmark package as well; a plain
      # `cargo test` only runs the workspace default members (the root crate).
      - run: cargo test --workspace --locked

  advisories:
    name: Security advisories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
